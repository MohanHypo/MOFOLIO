function h(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(k=>{const v=attrs[k];if(k==="style"&&typeof v==="object")Object.assign(e.style,v);else if(k==="onClick")e.addEventListener("click",v);else if(k==="onInput")e.addEventListener("input",v);else if(k==="onChange")e.addEventListener("change",v);else e.setAttribute(k,v);});
  if(children){const arr=Array.isArray(children)?children:[children];arr.forEach(c=>{if(c==null||c===false)return;e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);});}
  return e;
}

function subscribeToData(){
  if(unsubscribe)unsubscribe();
  // Listen to all subcollections in real time
  const uid=currentUser.uid;
  let loaded={profile:false,members:false,transactions:false,goals:false,feedbacks:false,customCats:false};
  function checkAndRender(){if(Object.values(loaded).every(Boolean))render();}

  onSnapshot(doc(db,"users",uid,"data","profile"),snap=>{
    STATE.profile=snap.exists()?snap.data():{name:currentUser.displayName||"",avatar:""};
    loaded.profile=true;checkAndRender();
  });
  onSnapshot(doc(db,"users",uid,"data","customCats"),snap=>{
    STATE.customCats=snap.exists()?snap.data():{income:[],expense:[]};
    loaded.customCats=true;checkAndRender();
  });
  onSnapshot(collection(db,"users",uid,"members"),snap=>{
    STATE.members=snap.docs.map(d=>d.data());
    if(STATE.members.length===0){STATE.members=[{id:1,name:currentUser.displayName||"Me",relation:"Self"}];saveMember(STATE.members[0]);}
    loaded.members=true;checkAndRender();
  });
  onSnapshot(collection(db,"users",uid,"transactions"),snap=>{
    STATE.transactions=snap.docs.map(d=>d.data()).sort((a,b)=>b.id-a.id);
    loaded.transactions=true;checkAndRender();
  });
  onSnapshot(collection(db,"users",uid,"goals"),snap=>{
    STATE.goals=snap.docs.map(d=>d.data());
    loaded.goals=true;checkAndRender();
  });
  onSnapshot(collection(db,"users",uid,"feedbacks"),snap=>{
    STATE.feedbacks=snap.docs.map(d=>d.data()).sort((a,b)=>b.id-a.id);
    loaded.feedbacks=true;checkAndRender();
  });
}

function allCats(t){return DCATS[t].concat((STATE.customCats&&STATE.customCats[t])||[]);}
function getIncome(){return STATE.transactions.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);}
function getExpense(){return STATE.transactions.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);}
function getSavings(){return getIncome()-getExpense();}
