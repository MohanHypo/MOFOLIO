<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;min-height:100vh}
input,select,textarea,button{font-family:inherit;outline:none;box-sizing:border-box}
button{cursor:pointer}
.tabs{display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;border:none;border-radius:8px 8px 0 0;padding:8px 13px;font-weight:500;font-size:13px;white-space:nowrap;cursor:pointer}

.badge{font-size:11px;padding:2px 8px;border-radius:20px;display:inline-block}
.hidden{display:none}
@media(max-width:400px){.grid2{grid-template-columns:1fr}}
</style>

<script>
const EMAILJS_SID="service_xkjncnn",EMAILJS_TID="template_bgbetpg",EMAILJS_KEY="Wb5IBL224ffdAFx0B",OWNER="mohanhypo1801@gmail.com";
const C={income:"#1D9E75",expense:"#D85A30",savings:"#378ADD",goal:"#7F77DD"};
const PCOLS=["#378ADD","#D85A30","#BA7517","#7F77DD","#1D9E75","#993C1D","#534AB7","#0F6E56"];
const DCATS={income:["Salary","Business","Freelance","Rental","Investment","Other"],expense:["Food","Transport","Housing","Healthcare","Education","Entertainment","Shopping","Utilities","EMI/Loan","Other"]};
const INVESTS=[{n:"SIP/Mutual Fund",r:"Medium",ret:"10-14%",h:"3+ yrs",c:"#378ADD"},{n:"PPF",r:"Low",ret:"7.1%",h:"15 yrs",c:"#1D9E75"},{n:"FD/RD",r:"Very Low",ret:"6-7.5%",h:"1-5 yrs",c:"#7F77DD"},{n:"Stocks/Equity",r:"High",ret:"12-18%",h:"5+ yrs",c:"#D85A30"},{n:"Gold/SGBs",r:"Low-Med",ret:"8-10%",h:"3+ yrs",c:"#BA7517"},{n:"NPS",r:"Medium",ret:"9-12%",h:"Till retire",c:"#0F6E56"},{n:"Real Estate",r:"Medium",ret:"8-12%",h:"5+ yrs",c:"#993C1D"}];
const fmt=n=>"₹"+Math.round(n).toLocaleString("en-IN");
const fmtC=n=>n>=10000000?"₹"+(n/10000000).toFixed(2)+"Cr":n>=100000?"₹"+(n/100000).toFixed(2)+"L":fmt(n);
const pct=(a,b)=>b===0?0:Math.round(a/b*100);
const el=(tag,attrs={},children=[])=>{const e=document.createElement(tag);Object.entries(attrs).forEach(([k,v])=>{if(k==="style"&&typeof v==="object")Object.assign(e.style,v);else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);else e.setAttribute(k,v);});(Array.isArray(children)?children:[children]).forEach(c=>{if(c===null||c===undefined)return;e.appendChild(typeof c==="string"?document.createTextNode(c):c);});return e;};
const h=el;

const INIT={profile:{name:"",},members:[{id:1,name:"Me",relation:"Self"}],transactions:[],goals:[],feedbacks:[],customCats:{income:[],expense:[]}};
function loadState(){try{const d=localStorage.getItem("mf5");return d?{...INIT,...JSON.parse(d)}:INIT;}catch{return INIT;}}
function saveState(s){try{localStorage.setItem("mf5",JSON.stringify(s));}catch{}}

let STATE=loadState();
let currentTab="dashboard";
const charts={};

function setState(updater){STATE=typeof updater==="function"?updater(STATE):({...STATE,...updater});saveState(STATE);render();}
function allCats(type){return[...DCATS[type],...(STATE.customCats?.[type]||[])];}
function totalIncome(){return STATE.transactions.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);}
function totalExpense(){return STATE.transactions.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);}
function savings(){return totalIncome()-totalExpense();}

// ── CHARTS ──
function makePie(canvasId,data,labels,colors){
  setTimeout(()=>{
    const canvas=document.getElementById(canvasId);
    if(!canvas)return;
    if(charts[canvasId])charts[canvasId].destroy();
    charts[canvasId]=new Chart(canvas,{type:"doughnut",data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:"#fff"}]},options:{responsive:false,cutout:"60%",plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${fmt(c.raw)}`}}}}});
  },50);
}
function makeBar(canvasId,data,labels,colors){
  setTimeout(()=>{
    const canvas=document.getElementById(canvasId);
    if(!canvas)return;
    if(charts[canvasId])charts[canvasId].destroy();
    charts[canvasId]=new Chart(canvas,{type:"bar",data:{labels,datasets:[{data,backgroundColor:colors,borderRadius:6,borderSkipped:false}]},options:{responsive:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmtC(c.raw)}}},scales:{y:{ticks:{callback:v=>fmtC(v)},grid:{color:"#f0f4f8"}},x:{grid:{display:false}}}}});
  },50);
}
function makeStackBar(canvasId,labels,d1,d2,c1,c2){
  setTimeout(()=>{
    const canvas=document.getElementById(canvasId);
    if(!canvas)return;
    if(charts[canvasId])charts[canvasId].destroy();
    charts[canvasId]=new Chart(canvas,{type:"bar",data:{labels,datasets:[{label:"Invested",data:d1,backgroundColor:c1,borderRadius:3,stack:"s"},{label:"Returns",data:d2,backgroundColor:c2,borderRadius:3,stack:"s"}]},options:{responsive:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fmtC(c.raw)}`}}},scales:{y:{stacked:true,ticks:{callback:v=>fmtC(v)},grid:{color:"#f0f4f8"}},x:{stacked:true,grid:{display:false},ticks:{maxRotation:45,autoSkip:true,maxTicksLimit:10}}}}});
  },50);
}

// ── DASHBOARD ──
function renderDashboard(){
  const inc=totalIncome(),exp=totalExpense(),sav=savings();
  const ratio=inc===0?0:exp/inc;
  let sevBg="#E1F5EE",sevBorder="#1D9E75",sevTc="#085041",sevIcon="✓",sevMsg="Saving 50%+ of income. Outstanding!",sevLevel="Excellent";
  let suggs=["Increase SIP contributions.","Explore NPS for tax benefits.","Consider direct equity for surplus."];
  if(ratio>1){sevBg="#FCEBEB";sevBorder="#A32D2D";sevTc="#501313";sevIcon="✕";sevMsg=`Deficit of ${fmt(exp-inc)}! Expenses exceed income.`;sevLevel="Critical";suggs=["Stop all discretionary spending NOW.","Clear highest-interest debt first.","Seek additional income urgently."];}
  else if(ratio>0.9){sevBg="#FAECE7";sevBorder="#D85A30";sevTc="#4A1B0C";sevIcon="⚠";sevMsg="Almost nothing is being saved!";sevLevel="Warning";suggs=["Apply 50-30-20 rule immediately.","Pause non-essential spending 30 days.","Start ₹500/month SIP — habit matters."];}
  else if(ratio>0.7){sevBg="#FAEEDA";sevBorder="#BA7517";sevTc="#412402";sevIcon="!";sevMsg="Expenses 70–90% of income. Savings thin.";sevLevel="Caution";suggs=["Cap top 2 expense categories.","Avoid new EMIs or revolving debt.","Explore side income."];}
  else if(ratio>0.5){sevBg="#E6F1FB";sevBorder="#378ADD";sevTc="#0C447C";sevIcon="↑";sevMsg="Expenses 50–70% of income. Good buffer.";sevLevel="Healthy";suggs=["Build 6-month emergency fund.","Do 10% annual step-up on SIPs.","Review subscriptions monthly."];}

  const expByCat={};
  STATE.transactions.filter(t=>t.type==="expense").forEach(t=>{expByCat[t.category]=(expByCat[t.category]||0)+t.amount;});
  const topCats=Object.entries(expByCat).sort((a,b)=>b[1]-a[1]);
  const profile=STATE.profile||{};
  const initials=profile.name?profile.name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2):"?";

  const div=document.createElement("div");
  // Profile bar
  div.appendChild(h("div",{class:"card",style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"1rem"}},[
    h("div",{style:{width:"40px",height:"40px",borderRadius:"50%",background:"#185FA5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"15px",fontWeight:"500",color:"#fff",flexShrink:"0"}},[initials]),
    h("div",{},[h("div",{style:{fontWeight:"500"}},[profile.name||"Welcome!"]),h("div",{style:{fontSize:"12px",color:"#6b7280"}},["Your financial overview"])]),
    h("button",{style:{marginLeft:"auto",background:"none",border:"0.5px solid #dde3ea",borderRadius:"8px",padding:"5px 10px",fontSize:"12px",color:"#185FA5"},onClick:()=>switchTab("profile")},["Profile"])
  ]));
  // Stats
  div.appendChild(h("div",{class:"flex",style:{marginBottom:"1rem"}},[
    h("div",{class:"stat"},[h("div",{class:"label"},["Total Income"]),h("div",{class:"value",style:{color:C.income}},[fmt(inc)])]),
    h("div",{class:"stat"},[h("div",{class:"label"},["Total Expenses"]),h("div",{class:"value",style:{color:C.expense}},[fmt(exp)])]),
    h("div",{class:"stat"},[h("div",{class:"label"},["Net Savings"]),h("div",{class:"value",style:{color:sav>=0?C.savings:C.expense}},[fmt(sav)]),h("div",{class:"sub"},[pct(sav,inc)+"% saved"])])
  ]));
  // Severity
  if(inc>0||exp>0){
    const sev=h("div",{style:{background:sevBg,border:`1.5px solid ${sevBorder}`,borderRadius:"12px",padding:"1rem",marginBottom:"1rem"}},[]);
    sev.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}},[
      h("span",{style:{width:"26px",height:"26px",borderRadius:"50%",background:sevBorder,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",fontWeight:"700",flexShrink:"0"}},[sevIcon]),
      h("span",{style:{fontWeight:"500",fontSize:"14px",color:sevTc}},["Health: "+sevLevel]),
      h("span",{style:{marginLeft:"auto",fontSize:"12px",color:sevTc,fontWeight:"500"}},[Math.round(ratio*100)+"%"])
    ]));
    sev.appendChild(h("div",{style:{fontSize:"13px",color:sevTc,marginBottom:"8px"}},[sevMsg]));
    suggs.forEach((s,i)=>{sev.appendChild(h("div",{style:{display:"flex",gap:"6px",marginBottom:"4px"}},[h("span",{style:{color:sevBorder,fontWeight:"700",fontSize:"11px",flexShrink:"0"}},[(i+1)+"."]),h("span",{style:{fontSize:"12px",color:sevTc,lineHeight:"1.5"}},[s])]));});
    div.appendChild(sev);
  }
  if(STATE.transactions.length===0){
    div.appendChild(h("div",{class:"card",style:{textAlign:"center",padding:"1.5rem"}},[
      h("div",{style:{color:"#6b7280",marginBottom:"10px",fontSize:"15px"}},["No transactions yet"]),
      h("button",{class:"btn-primary",style:{width:"auto",padding:"8px 20px"},onClick:()=>switchTab("transactions")},["Add first transaction"])
    ]));
  } else {
    // Expense pie
    if(topCats.length>0){
      const pc=h("div",{class:"card"},[h("div",{style:{fontWeight:"500",marginBottom:"10px"}},["Expense breakdown"])]);
      const row=h("div",{style:{display:"flex",gap:"12px",alignItems:"center",flexWrap:"wrap"}},[]);
      row.appendChild(h("canvas",{id:"pieExp",width:"150",height:"150"}));
      const leg=h("div",{style:{flex:"1",minWidth:"120px"}},[]);
      topCats.slice(0,6).forEach(([cat,amt],i)=>{
        const item=h("div",{style:{display:"flex",alignItems:"center",gap:"6px",marginBottom:"6px"}},[
          h("div",{style:{width:"8px",height:"8px",borderRadius:"2px",background:PCOLS[i%PCOLS.length],flexShrink:"0"}}),
          h("div",{style:{flex:"1"}},[
            h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"12px"}},[h("span",{},[cat]),h("span",{style:{fontWeight:"500"}},[pct(amt,exp)+"%"])]),
            h("div",{style:{background:"#f0f4f8",borderRadius:"4px",height:"3px",marginTop:"2px"}},[h("div",{style:{width:pct(amt,exp)+"%",height:"3px",borderRadius:"4px",background:PCOLS[i%PCOLS.length]}})])
          ])
        ]);
        leg.appendChild(item);
      });
      row.appendChild(leg);pc.appendChild(row);div.appendChild(pc);
      makePie("pieExp",topCats.map(([,v])=>v),topCats.map(([k])=>k),PCOLS);
    }
    // Income vs expense pie
    if(inc>0){
      const pc2=h("div",{class:"card"},[h("div",{style:{fontWeight:"500",marginBottom:"10px"}},["Income vs Expenses"])]);
      const row2=h("div",{style:{display:"flex",gap:"12px",alignItems:"center"}},[]);
      row2.appendChild(h("canvas",{id:"pieIE",width:"150",height:"150"}));
      const leg2=h("div",{},[]);
      [[C.income,"Income",inc],[C.expense,"Expenses",exp],[C.savings,"Savings",sav]].forEach(([c,l,v])=>{
        leg2.appendChild(h("div",{style:{display:"flex",gap:"6px",alignItems:"center",marginBottom:"8px"}},[h("div",{style:{width:"8px",height:"8px",borderRadius:"2px",background:c}}),h("span",{style:{fontSize:"13px",color:"#374151"}},[l+": "]),h("strong",{style:{color:l==="Savings"&&sav<0?C.expense:c}},[fmt(v)])]));
      });
      row2.appendChild(leg2);pc2.appendChild(row2);div.appendChild(pc2);
      makePie("pieIE",[inc,exp],["Income","Expenses"],[C.income,C.expense]);
    }
    // Goals snapshot
    if(STATE.goals.length>0){
      const gc=h("div",{class:"card"},[h("div",{style:{fontWeight:"500",marginBottom:"10px"}},["Goals snapshot"])]);
      STATE.goals.slice(0,3).forEach(g=>{
        const p=pct(g.saved||0,g.target);
        const dLeft=Math.ceil(g.years*365*(1-(g.saved||0)/g.target));
        const gd=h("div",{style:{marginBottom:"10px"}},[]);
        gd.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"13px",marginBottom:"3px"}},[h("span",{style:{fontWeight:"500"}},[g.name]),h("span",{style:{color:"#6b7280"}},[p+"%"])]));
        gd.appendChild(h("div",{style:{background:"#f0f4f8",borderRadius:"4px",height:"5px"}},[h("div",{style:{width:Math.min(p,100)+"%",height:"5px",borderRadius:"4px",background:C.goal}})]));
        gd.appendChild(h("div",{style:{fontSize:"11px",color:"#9ca3af",marginTop:"2px"}},[dLeft>0?"~"+dLeft+" days remaining":"Goal achieved!"]));
        gc.appendChild(gd);
      });
      div.appendChild(gc);
    }
  }
  return div;
}

// ── TRANSACTIONS ──
function renderTransactions(){
  let filterType="all",search="";
  const div=document.createElement("div");
  // Form
  let formType="income",selDate=new Date().toISOString().split("T")[0];
  let formData={type:"income",amount:"",category:"",note:"",memberId:STATE.members[0]?.id||1,date:selDate,time:new Date().toTimeString().slice(0,5)};

  const formCard=h("div",{class:"card"},[h("div",{style:{fontWeight:"500",marginBottom:"12px"}},["Add transaction"])]);
  const typeRow=h("div",{class:"flex",style:{marginBottom:"10px"}},[]);
  ["income","expense"].forEach(tp=>{
    const btn=h("button",{style:{flex:"1",padding:"8px",border:"0.5px solid",borderRadius:"8px",fontWeight:"500",fontSize:"13px",background:formType===tp?(tp==="income"?C.income:C.expense):"transparent",color:formType===tp?"#fff":"#6b7280",borderColor:formType===tp?"transparent":"#dde3ea"},onClick:()=>{
      formType=tp;formData.type=tp;formData.category="";
      typeRow.querySelectorAll("button").forEach((b,i)=>{const t=["income","expense"][i];Object.assign(b.style,{background:formType===t?(t==="income"?C.income:C.expense):"transparent",color:formType===t?"#fff":"#6b7280",borderColor:formType===t?"transparent":"#dde3ea"});});
      catSel.innerHTML="<option value=''>Category</option>";allCats(tp).forEach(c=>{catSel.appendChild(h("option",{value:c},[c]));});
    }},[tp==="income"?"Income":"Expense"]);
    typeRow.appendChild(btn);
  });
  formCard.appendChild(typeRow);
  const grid=h("div",{class:"grid2",style:{marginBottom:"8px"}},[]);
  const amtInp=h("input",{type:"number",placeholder:"Amount (₹)",class:"inp",onInput:e=>formData.amount=e.target.value});
  const catSel=h("select",{class:"inp",onChange:e=>formData.category=e.target.value},[h("option",{value:""},["Category"])]);
  allCats("income").forEach(c=>catSel.appendChild(h("option",{value:c},[c])));
  const memSel=h("select",{class:"inp",onChange:e=>formData.memberId=parseInt(e.target.value)});
  STATE.members.forEach(m=>memSel.appendChild(h("option",{value:m.id},[m.name])));
  const timeInp=h("input",{type:"time",class:"inp",value:formData.time,onInput:e=>formData.time=e.target.value});
  grid.appendChild(amtInp);grid.appendChild(catSel);grid.appendChild(memSel);grid.appendChild(timeInp);
  formCard.appendChild(grid);

  // Simple date input
  const dateInp=h("input",{type:"date",class:"inp",value:selDate,style:{marginBottom:"8px"},onInput:e=>formData.date=e.target.value});
  formCard.appendChild(dateInp);
  const noteInp=h("input",{type:"text",placeholder:"Note (optional)",class:"inp",style:{marginBottom:"10px"},onInput:e=>formData.note=e.target.value});
  formCard.appendChild(noteInp);
  formCard.appendChild(h("button",{class:"btn-primary",onClick:()=>{
    if(!formData.amount||isNaN(formData.amount))return;
    const tx={...formData,id:Date.now(),amount:parseFloat(formData.amount),category:formData.category||allCats(formData.type)[0]};
    setState(s=>({...s,transactions:[tx,...s.transactions]}));
    amtInp.value="";noteInp.value="";formData.amount="";formData.note="";
  }},["Add Transaction"]));
  div.appendChild(formCard);

  // Filter
  const filterRow=h("div",{class:"flex",style:{marginBottom:"8px",flexWrap:"wrap"}},[]);
  ["all","income","expense"].forEach(f=>{
    filterRow.appendChild(h("button",{style:{padding:"6px 12px",borderRadius:"20px",border:"0.5px solid #dde3ea",fontSize:"12px",fontWeight:"500",background:filterType===f?"#185FA5":"#fff",color:filterType===f?"#fff":"#6b7280"},onClick:()=>{filterType=f;refreshList();}},[f==="all"?"All":f==="income"?"Income":"Expenses"]));
  });
  div.appendChild(filterRow);
  const searchInp=h("input",{type:"text",placeholder:"Search...",class:"inp",style:{marginBottom:"1rem"},onInput:e=>{search=e.target.value;refreshList();}});
  div.appendChild(searchInp);

  const listDiv=h("div",{},[]);
  div.appendChild(listDiv);

  function refreshList(){
    const filtered=STATE.transactions.filter(t=>(filterType==="all"||t.type===filterType)&&(!search||t.category?.toLowerCase().includes(search.toLowerCase())||t.note?.toLowerCase().includes(search.toLowerCase())));
    listDiv.innerHTML="";
    if(filtered.length===0){listDiv.appendChild(h("div",{style:{textAlign:"center",color:"#6b7280",padding:"2rem"}},["No transactions found"]));return;}
    const tCard=h("div",{class:"card",style:{padding:"0",overflow:"hidden"}},[]);
    const table=h("table",{style:{width:"100%",fontSize:"12px",borderCollapse:"collapse"}},[]);
    const thead=h("thead",{},[h("tr",{style:{background:"#f8fafc"}},[
      ...["Note","Category","Date","Time","Amount",""].map((hd,i)=>h("th",{style:{padding:"8px 6px",textAlign:i===4?"right":"left",color:"#6b7280",fontWeight:"500",borderBottom:"0.5px solid #dde3ea",whiteSpace:"nowrap"}},[hd]))
    ])]);
    table.appendChild(thead);
    const tbody=h("tbody",{},[]);
    filtered.forEach((tx,i)=>{
      const member=STATE.members.find(m=>m.id===tx.memberId);
      const tr=h("tr",{style:{background:i%2===0?"#fff":"#fafafa",borderBottom:"0.5px solid #f0f4f8"}},[
        h("td",{style:{padding:"7px 6px",fontWeight:"500",color:"#374151",maxWidth:"80px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},[tx.note||member?.name||"—"]),
        h("td",{style:{padding:"7px 6px",color:"#6b7280",maxWidth:"80px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},[tx.category||""]),
        h("td",{style:{padding:"7px 6px",color:"#6b7280",whiteSpace:"nowrap"}},[tx.date||""]),
        h("td",{style:{padding:"7px 6px",color:"#6b7280",whiteSpace:"nowrap"}},[tx.time||"—"]),
        h("td",{style:{padding:"7px 6px",textAlign:"right",fontWeight:"500",color:tx.type==="income"?C.income:C.expense,whiteSpace:"nowrap"}},[(tx.type==="income"?"+":"-")+fmt(tx.amount)]),
        h("td",{style:{padding:"7px 6px",textAlign:"center"}},[h("button",{style:{background:"none",border:"none",color:"#9ca3af",fontSize:"16px",cursor:"pointer"},onClick:()=>{setState(s=>({...s,transactions:s.transactions.filter(t=>t.id!==tx.id)}));}},[" × "])])
      ]);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);tCard.appendChild(table);listDiv.appendChild(tCard);
  }
  refreshList();
  return div;
}

// ── MEMBERS ──
function renderMembers(){
  const div=document.createElement("div");
  const card=h("div",{class:"card"},[h("div",{style:{fontWeight:"500",marginBottom:"12px"}},["Add family member"])]);
  const grid=h("div",{class:"grid2",style:{marginBottom:"10px"}},[]);
  const nameInp=h("input",{type:"text",placeholder:"Name",class:"inp"});
  const relSel=h("select",{class:"inp"},[h("option",{value:""},["Relation"]),...["Spouse","Child","Parent","Sibling","Other"].map(r=>h("option",{value:r},[r]))]);
  grid.appendChild(nameInp);grid.appendChild(relSel);card.appendChild(grid);
  card.appendChild(h("button",{class:"btn-primary",onClick:()=>{
    if(!nameInp.value.trim())return;
    setState(s=>({...s,members:[...s.members,{id:Date.now(),name:nameInp.value.trim(),relation:relSel.value||"Other"}]}));
    nameInp.value="";relSel.value="";
  }},["Add Member"]));
  div.appendChild(card);

function renderSIP(){

  function calcSIP(){
    const r=rate/100/12;

    if(stepUp===0){const n=years*12;fv=monthly*((Math.pow(1+r,n)-1)/r)*(1+r);inv=monthly*n;}
    else{fv=0;inv=0;let m=monthly;for(let y=0;y<years;y++){for(let mo=0;mo<12;mo++){fv=(fv+m)*(1+r);inv+=m;}m*=(1+stepUp/100);}}

  }

    const {fv,inv,returns}=calcSIP();

  }
  const fc=h("div",{class:"card"},[h("div",{style:{fontWeight:"500",fontSize:"15px",color:"#185FA5",marginBottom:"14px"}},["SIP Calculator"])]);

function renderCorpus(){
  let mode="build",targetCorpus=10000000,monthly=10000,rate=12,years=20,inflation=6;
  const div=document.createElement("div");
  const resDiv=h("div",{class:"card"},[]);
  const tableDiv=h("div",{class:"card"},[]);
  const mileDiv=h("div",{class:"card"},[]);

  function calcBuild(){
    const r=rate/100/12,n=years*12;
    const fv=monthly*((Math.pow(1+r,n)-1)/r)*(1+r);
    const rows=[];
    for(let y=1;y<=years;y++){const ny=y*12;const nf=monthly*((Math.pow(1+r,ny)-1)/r)*(1+r);const inv=monthly*ny;rows.push({y,inv,nomFv:nf,realV:nf/Math.pow(1+inflation/100,y),gain:nf-inv});}
    return{fv,inv:monthly*n,returns:fv-monthly*n,realFv:fv/Math.pow(1+inflation/100,years),realRate:(((1+rate/100)/(1+inflation/100))-1)*100,rows};
  }
  function calcTarget(){
    const r=rate/100/12,n=years*12;
    const needed=targetCorpus/((((Math.pow(1+r,n)-1)/r)*(1+r)));
    const rows=[];
    for(let y=1;y<=years;y++){const ny=y*12;const nf=needed*((Math.pow(1+r,ny)-1)/r)*(1+r);const inv=needed*ny;rows.push({y,inv,nomFv:nf,realV:nf/Math.pow(1+inflation/100,y),gain:nf-inv});}
    return{needed,inv:needed*n,returns:targetCorpus-needed*n,realFv:targetCorpus/Math.pow(1+inflation/100,years),rows};
  }

  function updateAll(){
    resDiv.innerHTML="";tableDiv.innerHTML="";mileDiv.innerHTML="";
    if(mode==="build"){
      const d=calcBuild();
      resDiv.appendChild(h("div",{style:{fontWeight:"500",marginBottom:"4px"}},["Your corpus projection"]));
      resDiv.appendChild(resultRow("Total Invested",fmtC(d.inv)));
      resDiv.appendChild(resultRow("Returns Earned",fmtC(d.returns)));
      resDiv.appendChild(resultRow("Nominal Corpus",fmtC(d.fv),true));
      resDiv.appendChild(resultRow("Real Value (today's ₹)",fmtC(d.realFv)));
      resDiv.appendChild(resultRow("Real Return Rate",d.realRate.toFixed(1)+"% p.a."));
      resDiv.appendChild(h("canvas",{id:"corpBar",width:"300",height:"150",style:{marginTop:"12px"}}));
      makeBar("corpBar",[d.inv,d.returns,d.fv],["Invested","Returns","Total"],["#378ADD","#1D9E75","#185FA5"]);
      renderTable(d.rows);
    } else {
      const d=calcTarget();
      resDiv.appendChild(h("div",{style:{fontWeight:"500",marginBottom:"4px"}},["Monthly investment needed"]));
      resDiv.appendChild(resultRow("Monthly SIP Required",fmt(d.needed),true));
      resDiv.appendChild(resultRow("Total You'll Invest",fmtC(d.inv)));
      resDiv.appendChild(resultRow("Returns Earned",fmtC(Math.max(d.returns,0))));
      resDiv.appendChild(resultRow("Target Corpus",fmtC(targetCorpus)));

// ── AI BOT ──
function renderBot(){
  const div=h("div",{},[]);
  const msgs=[{role:"assistant",text:"Hi! I'm your MoFolio finance assistant. Ask me anything about your finances, budgeting, investments, or savings goals!"}];
  const inc=totalIncome(),exp=totalExpense(),sav=savings();
  const expByCat={};STATE.transactions.filter(t=>t.type==="expense").forEach(t=>{expByCat[t.category]=(expByCat[t.category]||0)+t.amount;});
  const topExp=Object.entries(expByCat).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k,v])=>k+": ₹"+Math.round(v)).join(", ");
  const sysPrompt=`You are MoFolio's personal finance assistant for an Indian user. Be concise, friendly, practical. Use ₹. User data: Income ₹${Math.round(inc)}, Expenses ₹${Math.round(exp)}, Savings ₹${Math.round(sav)}, Rate ${inc>0?Math.round(sav/inc*100):0}%, Top expenses: ${topExp||"none"}, Goals: ${STATE.goals.length}, Members: ${STATE.members.length}. Give actionable advice. Under 150 words.`;
  const chatDiv=h("div",{class:"card",style:{minHeight:"320px",maxHeight:"450px",overflowY:"auto",display:"flex",flexDirection:"column",gap:"10px",marginBottom:"1rem"}},[]);
  function addMsg(role,text){
    msgs.push({role,text});
    const bubble=h("div",{style:{display:"flex",justifyContent:role==="user"?"flex-end":"flex-start"}},[h("div",{style:{maxWidth:"80%",background:role==="user"?"#185FA5":"#f0f4f8",color:role==="user"?"#fff":"#1a1a1a",borderRadius:role==="user"?"12px 12px 4px 12px":"12px 12px 12px 4px",padding:"10px 12px",fontSize:"13px",lineHeight:"1.6"}},[text])]);
    chatDiv.appendChild(bubble);chatDiv.scrollTop=chatDiv.scrollHeight;
  }
  addMsg("assistant",msgs[0].text);
  // Suggestion chips
  const chips=h("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"10px"}},[]);
  ["How can I reduce expenses?","Where to invest savings?","Am I on track with goals?","Suggest a budget plan"].forEach(s=>{chips.appendChild(h("button",{style:{padding:"5px 10px",borderRadius:"20px",border:"0.5px solid #185FA5",fontSize:"11px",background:"#E6F1FB",color:"#185FA5",cursor:"pointer"},onClick:()=>{inp.value=s;}},[ s]));});
  const inputRow=h("div",{class:"flex"},[]);
  const inp=h("input",{type:"text",placeholder:"Ask about your finances...",class:"inp",style:{flex:"1"}});
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")sendMsg();});
  const sendBtn=h("button",{style:{background:"#185FA5",color:"#fff",border:"none",borderRadius:"8px",padding:"0 16px",fontWeight:"500",cursor:"pointer"},onClick:sendMsg},["Send"]);
  inputRow.appendChild(inp);inputRow.appendChild(sendBtn);
  async function sendMsg(){
    const text=inp.value.trim();if(!text)return;inp.value="";
    addMsg("user",text);sendBtn.disabled=true;sendBtn.textContent="...";
    const history=msgs.slice(-6).map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text}));
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,system:sysPrompt,messages:history})});
      const data=await res.json();
      addMsg("assistant",data.content?.[0]?.text||"Sorry, couldn't respond. Try again.");
    }catch(e){addMsg("assistant","Connection error. Please check internet and try again.");}
    sendBtn.disabled=false;sendBtn.textContent="Send";
  }
  div.appendChild(chatDiv);div.appendChild(chips);div.appendChild(inputRow);
  return div;
}

// ── DOWNLOAD CSV ──
function downloadCSV(){
  const headers=["Note","Category","Type","Member","Date","Time","Amount"];
  const rows=STATE.transactions.map(tx=>{
    const m=STATE.members.find(m=>m.id===tx.memberId);
    return[tx.note||"",tx.category,tx.type,m?.name||"",tx.date,tx.time||"",tx.amount].map(v=>`"${v}"`).join(",");
  });
  const csv=[headers.join(","),...rows].join("\n");
  const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="MoFolio_Statement_"+new Date().toISOString().split("T")[0]+".csv";a.click();
}

// ── TABS & RENDER ──
const TABS=[{id:"dashboard",label:"Home"},{id:"transactions",label:"Transactions"},{id:"members",label:"Family"},{id:"goals",label:"Goals"},{id:"invest",label:"Invest"},{id:"calculators",label:"Calculators"},{id:"bot",label:"AI Bot"},{id:"feedback",label:"Feedback"},{id:"profile",label:"Profile"}];

function switchTab(id){
  currentTab=id;
  document.querySelectorAll(".tab").forEach(b=>{
    const active=b.dataset.tab===id;
    b.style.background=active?"#fff":"transparent";
    b.style.color=active?"#185FA5":"#fff";
  });
  const content=document.getElementById("content");
  content.innerHTML="";
  const renderers={dashboard:renderDashboard,transactions:renderTransactions,members:renderMembers,goals:renderGoals,invest:renderInvest,calculators:renderCalculators,bot:renderBot,feedback:renderFeedback,profile:renderProfile};
  content.appendChild(renderers[id]());
}

function render(){
  switchTab(currentTab);
}

// ── INIT ──
function init(){
  const app=document.getElementById("app");
  const profile=STATE.profile||{};
  const initials=profile.name?profile.name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2):"?";

  const header=h("div",{style:{background:"#185FA5",padding:"1rem 1rem 0",color:"#fff"}},[]);
  const topRow=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"0.75rem"}},[
    h("div",{},[h("div",{style:{fontSize:"20px",fontWeight:"500"}},["MoFolio"]),h("div",{style:{fontSize:"12px",opacity:"0.8"}},["Personal & Family Finance"])]),
    h("div",{style:{display:"flex",gap:"8px",alignItems:"center"}},[
      h("button",{style:{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:"8px",padding:"6px 10px",color:"#fff",fontSize:"12px",cursor:"pointer"},onClick:downloadCSV},["↓ Statement"]),

    ])
  ]);
  header.appendChild(topRow);

  const tabsDiv=h("div",{class:"tabs"},[]);
  TABS.forEach(t=>{
    const btn=h("button",{class:"tab","data-tab":t.id,style:{background:t.id===currentTab?"#fff":"transparent",color:t.id===currentTab?"#185FA5":"#fff"},onClick:()=>switchTab(t.id)},[t.label]);
    tabsDiv.appendChild(btn);

  header.appendChild(tabsDiv);

  const content=h("div",{id:"content",style:{padding:"1rem"}},[]);

init();
